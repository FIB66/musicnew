<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MusicNew — Musica Live in Italia</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
  <script src="italia-map.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #0a0a0a;
      --dark: #111111;
      --card: #1a1a1a;
      --border: #2a2a2a;
      --red: #e63946;
      --red2: #ff6b6b;
      --white: #f0ece4;
      --gray: #888;
      --font-display: 'Bebas Neue', sans-serif;
      --font-body: 'DM Sans', sans-serif;
    }

    html, body { 
      background: var(--black); 
      color: var(--white); 
      font-family: var(--font-body);
      min-height: 100vh;
    }

    /* HEADER */
    header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(10,10,10,0.95);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      display: flex; align-items: center; justify-content: space-between;
      height: 64px;
    }
    .logo {
      font-family: var(--font-display);
      font-size: 28px;
      letter-spacing: 2px;
      color: var(--white);
      display: flex; align-items: center; gap: 8px;
    }
    .logo span { color: var(--red); }
    nav { display: flex; gap: 8px; }
    nav button {
      background: none; border: none; cursor: pointer;
      font-family: var(--font-body); font-size: 14px; font-weight: 500;
      color: var(--gray); padding: 8px 16px; border-radius: 8px;
      transition: all 0.2s;
    }
    nav button:hover, nav button.active {
      color: var(--white); background: var(--card);
    }
    nav button.active { color: var(--red); }
    .btn-add {
      background: var(--red) !important;
      color: var(--white) !important;
      border-radius: 8px !important;
      font-weight: 600 !important;
    }
    .btn-add:hover { background: var(--red2) !important; }

    /* HERO */
    .hero {
      padding: 80px 24px 60px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at 50% 0%, rgba(230,57,70,0.15) 0%, transparent 70%);
      pointer-events: none;
    }
    .hero h1 {
      font-family: var(--font-display);
      font-size: clamp(56px, 10vw, 120px);
      line-height: 0.9;
      letter-spacing: 3px;
      margin-bottom: 24px;
    }
    .hero h1 em { color: var(--red); font-style: normal; }
    .hero p {
      font-size: 18px; color: var(--gray);
      max-width: 500px; margin: 0 auto 40px;
      line-height: 1.6;
    }
    .search-bar {
      display: flex; gap: 12px; max-width: 480px; margin: 0 auto;
    }
    .search-bar input {
      flex: 1; padding: 14px 20px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; color: var(--white);
      font-family: var(--font-body); font-size: 16px;
      outline: none; transition: border 0.2s;
    }
    .search-bar input:focus { border-color: var(--red); }
    .search-bar input::placeholder { color: var(--gray); }
    .search-bar button {
      padding: 14px 28px; background: var(--red);
      border: none; border-radius: 12px; color: var(--white);
      font-family: var(--font-body); font-size: 16px; font-weight: 600;
      cursor: pointer; transition: background 0.2s;
    }
    .search-bar button:hover { background: var(--red2); }

    /* STATS BAR */
    .stats-bar {
      display: flex; justify-content: center; gap: 48px;
      padding: 32px 24px;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }
    .stat { text-align: center; }
    .stat-num {
      font-family: var(--font-display);
      font-size: 40px; color: var(--red);
      line-height: 1;
    }
    .stat-label { font-size: 13px; color: var(--gray); margin-top: 4px; }

    /* SECTION */
    .section { padding: 48px 24px; max-width: 1200px; margin: 0 auto; }
    .section-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 32px;
    }
    .section-title {
      font-family: var(--font-display);
      font-size: 36px; letter-spacing: 1px;
    }
    .section-title span { color: var(--red); }
    .see-all {
      font-size: 14px; color: var(--gray);
      cursor: pointer; text-decoration: underline;
      background: none; border: none; font-family: var(--font-body);
    }
    .see-all:hover { color: var(--white); }

    /* GRID */
    .grid { display: grid; gap: 20px; }
    .grid-3 { grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); }
    .grid-2 { grid-template-columns: repeat(auto-fill, minmax(480px, 1fr)); }

    /* CARD VENUE */
    .card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 16px; overflow: hidden;
      transition: transform 0.2s, border-color 0.2s;
      cursor: pointer;
    }
    .card:hover { transform: translateY(-4px); border-color: var(--red); }
    .card-img {
      height: 160px; background: var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 48px;
      background: linear-gradient(135deg, #1a1a1a, #2a2a2a);
    }
    .card-body { padding: 20px; }
    .card-name {
      font-family: var(--font-display);
      font-size: 22px; letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    .card-meta { display: flex; gap: 12px; flex-wrap: wrap; }
    .tag {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 12px; color: var(--gray);
      background: rgba(255,255,255,0.05);
      padding: 4px 10px; border-radius: 20px;
    }
    .tag.red { color: var(--red); background: rgba(230,57,70,0.1); }

    /* CARD EVENT */
    .event-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 16px; padding: 24px;
      display: flex; gap: 20px; align-items: flex-start;
      transition: transform 0.2s, border-color 0.2s;
      cursor: pointer;
    }
    .event-card:hover { transform: translateY(-2px); border-color: var(--red); }
    .event-date {
      min-width: 60px; text-align: center;
      background: rgba(230,57,70,0.1); border-radius: 12px;
      padding: 12px 8px;
    }
    .event-day {
      font-family: var(--font-display); font-size: 32px;
      color: var(--red); line-height: 1;
    }
    .event-month { font-size: 11px; color: var(--gray); text-transform: uppercase; letter-spacing: 1px; }
    .event-info { flex: 1; }
    .event-title {
      font-family: var(--font-display);
      font-size: 20px; margin-bottom: 8px;
    }
    .event-venue { font-size: 14px; color: var(--gray); margin-bottom: 8px; }

    /* EMPTY STATE */
    .empty {
      text-align: center; padding: 60px 20px;
      color: var(--gray);
    }
    .empty-icon { font-size: 48px; margin-bottom: 16px; }
    .empty h3 { font-size: 20px; color: var(--white); margin-bottom: 8px; }

    /* MODAL */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.85); backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }
    .modal {
      background: var(--dark); border: 1px solid var(--border);
      border-radius: 20px; padding: 36px; width: 100%; max-width: 520px;
      max-height: 90vh; overflow-y: auto;
    }
    .modal h2 {
      font-family: var(--font-display); font-size: 32px;
      margin-bottom: 24px;
    }
    .modal h2 span { color: var(--red); }
    .form-group { margin-bottom: 20px; }
    .form-group label {
      display: block; font-size: 13px; color: var(--gray);
      text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px;
    }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%; padding: 12px 16px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; color: var(--white);
      font-family: var(--font-body); font-size: 15px;
      outline: none; transition: border 0.2s;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
      border-color: var(--red);
    }
    .form-group select option { background: var(--dark); }
    .form-group textarea { resize: vertical; min-height: 80px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .btn-submit {
      width: 100%; padding: 14px;
      background: var(--red); border: none; border-radius: 12px;
      color: var(--white); font-family: var(--font-body);
      font-size: 16px; font-weight: 600; cursor: pointer;
      transition: background 0.2s; margin-top: 8px;
    }
    .btn-submit:hover { background: var(--red2); }
    .btn-cancel {
      width: 100%; padding: 12px;
      background: none; border: 1px solid var(--border); border-radius: 12px;
      color: var(--gray); font-family: var(--font-body);
      font-size: 15px; cursor: pointer; margin-top: 8px;
      transition: border-color 0.2s;
    }
    .btn-cancel:hover { border-color: var(--white); color: var(--white); }

    /* LOADING */
    .loading {
      display: flex; justify-content: center; align-items: center;
      padding: 60px; color: var(--gray); gap: 12px;
    }
    .spinner {
      width: 24px; height: 24px; border: 2px solid var(--border);
      border-top-color: var(--red); border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* TOAST */
    .toast {
      position: fixed; bottom: 24px; right: 24px; z-index: 300;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 16px 24px;
      font-size: 15px; animation: slideUp 0.3s ease;
    }
    .toast.success { border-color: #22c55e; color: #22c55e; }
    .toast.error { border-color: var(--red); color: var(--red); }
    @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    /* FOOTER */
    footer {
      border-top: 1px solid var(--border);
      padding: 32px 24px; text-align: center;
      color: var(--gray); font-size: 13px;
      margin-top: 80px;
    }

    /* AUTH */
    .user-area { display: flex; align-items: center; gap: 10px; }
    .user-avatar {
      width: 34px; height: 34px; border-radius: 50%;
      background: var(--red); display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700; color: white; cursor: pointer;
      border: 2px solid var(--border); transition: border-color 0.2s; flex-shrink: 0;
    }
    .user-avatar:hover { border-color: var(--red2); }
    .user-name { font-size: 13px; color: var(--gray); max-width: 100px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .btn-logout {
      background: none; border: 1px solid var(--border); border-radius: 8px;
      color: var(--gray); font-family: var(--font-body); font-size: 12px;
      padding: 6px 12px; cursor: pointer; transition: all 0.2s;
    }
    .btn-logout:hover { border-color: var(--red); color: var(--red); }
    .btn-login {
      background: none; border: 1px solid var(--border); border-radius: 8px;
      color: var(--white); font-family: var(--font-body); font-size: 14px; font-weight: 500;
      padding: 8px 16px; cursor: pointer; transition: all 0.2s;
    }
    .btn-login:hover { border-color: var(--red); color: var(--red); }
    .auth-tabs { display: flex; gap: 0; margin-bottom: 28px; border-bottom: 1px solid var(--border); }
    .auth-tab {
      flex: 1; padding: 12px; background: none; border: none;
      color: var(--gray); font-family: var(--font-body); font-size: 15px;
      cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.2s;
    }
    .auth-tab.active { color: var(--white); border-bottom-color: var(--red); }
    .auth-error { color: var(--red); font-size: 13px; margin-bottom: 16px; padding: 10px 14px; background: rgba(230,57,70,0.1); border-radius: 8px; }

    /* ── SEZIONE MAPPA ── */
    .map-section {
      padding: 56px 24px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(230,57,70,0.04) 0%, transparent 100%);
    }
    .map-section-inner {
      max-width: 1200px; margin: 0 auto;
      display: grid; grid-template-columns: 1fr 380px; gap: 64px; align-items: center;
    }
    .map-section-text { }
    .map-eyebrow {
      font-size: 11px; font-weight: 600; letter-spacing: .12em;
      text-transform: uppercase; color: var(--red); margin-bottom: 16px;
    }
    .map-section-text h2 {
      font-family: var(--font-display);
      font-size: clamp(36px, 5vw, 60px);
      line-height: 0.95; letter-spacing: 1px; margin-bottom: 20px;
    }
    .map-section-text h2 em { color: var(--red); font-style: normal; }
    .map-section-text p { font-size: 16px; color: var(--gray); line-height: 1.65; max-width: 420px; }
    .map-region-badge {
      display: inline-flex; align-items: center; gap: 10px;
      margin-top: 28px; padding: 12px 20px;
      background: rgba(230,57,70,0.12); border: 1px solid rgba(230,57,70,0.3);
      border-radius: 12px; font-size: 15px; font-weight: 500;
      transition: all 0.3s;
    }
    .map-region-badge .badge-name { color: var(--red); font-family: var(--font-display); font-size: 22px; letter-spacing: 1px; }
    .map-region-badge .badge-count { color: var(--gray); font-size: 13px; }
    .map-region-badge.hidden { display: none; }
    .map-btn {
      display: inline-flex; align-items: center; gap: 8px;
      margin-top: 12px; padding: 12px 24px;
      background: var(--red); border: none; border-radius: 10px;
      color: var(--white); font-family: var(--font-body);
      font-size: 14px; font-weight: 600; cursor: pointer;
      transition: background 0.2s; text-decoration: none;
    }
    .map-btn:hover { background: var(--red2); }

    /* Override stile web component per tema dark */
    .map-col-wrap {
      display: flex; justify-content: center; align-items: center;
    }
    italia-map {
      --im-color-base: #e63946;
      --im-color-hover: #ff6b6b;
      filter: drop-shadow(0 0 40px rgba(230,57,70,0.25));
    }

    @media (max-width: 900px) {
      .map-section-inner { grid-template-columns: 1fr; gap: 40px; }
      .map-col-wrap { order: -1; }
    }

    @media (max-width: 600px) {
      .stats-bar { gap: 24px; }
      .form-row { grid-template-columns: 1fr; }
      nav button:not(.btn-add) { display: none; }
    }
  </style>
</head>
<body>
<div id="root"></div>
<div id="map-root" style="display:none; justify-content:center; align-items:center;">
  <italia-map
    id="the-italia-map"
    width="280"
    height="470"
    color-base="#e63946"
    color-hover="#ff6b6b"
    show-list="false"
    show-info="false"
  ></italia-map>
</div>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;

// SUPABASE CONFIG
const SUPABASE_URL = 'https://lvzhofnavzbsinmjvoiy.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx2emhvZm5hdnpic2lubWp2b2l5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxNTQwNTEsImV4cCI6MjA4ODczMDA1MX0.GMgF4xg9yV-DPFMXaCeFxFb7wGsYcuvuk-SvLtL_fWU';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const GENERI = ['Rock','Jazz','Punk','Metal','Folk','Elettronica','Hip-Hop','Reggae','Blues','Pop','Liscio','Salsa','Classica','Altro'];
const TIPI_EVENTO = ['Concerto','Festa','Festival','Jam Session','Serata DJ','Altro'];

function getEmoji(genere) {
  const map = { Rock:'🎸', Jazz:'🎷', Punk:'⚡', Metal:'🤘', Folk:'🪕', Elettronica:'🎧',
    'Hip-Hop':'🎤', Reggae:'🌿', Blues:'🎵', Pop:'🌟', Liscio:'💃', Salsa:'🕺', Classica:'🎻', Altro:'🎼' };
  return map[genere] || '🎵';
}

function formatDate(dateStr) {
  if (!dateStr) return { day: '?', month: '???' };
  const d = new Date(dateStr);
  return {
    day: d.getDate(),
    month: d.toLocaleString('it-IT', { month: 'short' }).toUpperCase()
  };
}

// TOAST
function Toast({ msg, type, onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 3000); return () => clearTimeout(t); }, []);
  return <div className={`toast ${type}`}>{msg}</div>;
}

// MODAL AGGIUNGI LOCALE
function ModalVenue({ onClose, onSaved }) {
  const [form, setForm] = useState({ nome:'', citta:'', indirizzo:'', genere:'Rock', descrizione:'', sito_web:'' });
  const [saving, setSaving] = useState(false);

  const save = async () => {
    if (!form.nome || !form.citta) return alert('Nome e città sono obbligatori');
    setSaving(true);
    const { error } = await supabase.from('venues').insert([form]);
    setSaving(false);
    if (error) { alert('Errore: ' + error.message); return; }
    onSaved();
    onClose();
  };

  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal">
        <h2>Aggiungi <span>Locale</span></h2>
        <div className="form-group">
          <label>Nome locale *</label>
          <input value={form.nome} onChange={e => setForm({...form, nome: e.target.value})} placeholder="Es. Circolo Arci Roma" />
        </div>
        <div className="form-row">
          <div className="form-group">
            <label>Città *</label>
            <input value={form.citta} onChange={e => setForm({...form, citta: e.target.value})} placeholder="Es. Bologna" />
          </div>
          <div className="form-group">
            <label>Genere principale</label>
            <select value={form.genere} onChange={e => setForm({...form, genere: e.target.value})}>
              {GENERI.map(g => <option key={g}>{g}</option>)}
            </select>
          </div>
        </div>
        <div className="form-group">
          <label>Indirizzo</label>
          <input value={form.indirizzo} onChange={e => setForm({...form, indirizzo: e.target.value})} placeholder="Via..." />
        </div>
        <div className="form-group">
          <label>Descrizione</label>
          <textarea value={form.descrizione} onChange={e => setForm({...form, descrizione: e.target.value})} placeholder="Raccontaci il locale..." />
        </div>
        <div className="form-group">
          <label>Sito web</label>
          <input value={form.sito_web} onChange={e => setForm({...form, sito_web: e.target.value})} placeholder="https://..." />
        </div>
        <button className="btn-submit" onClick={save} disabled={saving}>{saving ? 'Salvataggio...' : '✅ Aggiungi Locale'}</button>
        <button className="btn-cancel" onClick={onClose}>Annulla</button>
      </div>
    </div>
  );
}

// MODAL AGGIUNGI EVENTO
function ModalEvent({ onClose, onSaved }) {
  const [form, setForm] = useState({ titolo:'', citta:'', data:'', ora:'', tipo:'Concerto', genere:'Rock', descrizione:'' });
  const [saving, setSaving] = useState(false);

  const save = async () => {
    if (!form.titolo || !form.citta || !form.data) return alert('Titolo, città e data sono obbligatori');
    setSaving(true);
    const { error } = await supabase.from('events').insert([form]);
    setSaving(false);
    if (error) { alert('Errore: ' + error.message); return; }
    onSaved();
    onClose();
  };

  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal">
        <h2>Aggiungi <span>Evento</span></h2>
        <div className="form-group">
          <label>Titolo evento *</label>
          <input value={form.titolo} onChange={e => setForm({...form, titolo: e.target.value})} placeholder="Es. Serata Jazz al Circolo" />
        </div>
        <div className="form-row">
          <div className="form-group">
            <label>Città *</label>
            <input value={form.citta} onChange={e => setForm({...form, citta: e.target.value})} placeholder="Es. Ancona" />
          </div>
          <div className="form-group">
            <label>Tipo</label>
            <select value={form.tipo} onChange={e => setForm({...form, tipo: e.target.value})}>
              {TIPI_EVENTO.map(t => <option key={t}>{t}</option>)}
            </select>
          </div>
        </div>
        <div className="form-row">
          <div className="form-group">
            <label>Data *</label>
            <input type="date" value={form.data} onChange={e => setForm({...form, data: e.target.value})} />
          </div>
          <div className="form-group">
            <label>Ora</label>
            <input type="time" value={form.ora} onChange={e => setForm({...form, ora: e.target.value})} />
          </div>
        </div>
        <div className="form-group">
          <label>Genere musicale</label>
          <select value={form.genere} onChange={e => setForm({...form, genere: e.target.value})}>
            {GENERI.map(g => <option key={g}>{g}</option>)}
          </select>
        </div>
        <div className="form-group">
          <label>Descrizione</label>
          <textarea value={form.descrizione} onChange={e => setForm({...form, descrizione: e.target.value})} placeholder="Raccontaci l'evento..." />
        </div>
        <button className="btn-submit" onClick={save} disabled={saving}>{saving ? 'Salvataggio...' : '✅ Aggiungi Evento'}</button>
        <button className="btn-cancel" onClick={onClose}>Annulla</button>
      </div>
    </div>
  );
}

// MODAL AUTH (Login + Registrazione)
function ModalAuth({ onClose, onLogged }) {
  const [authTab, setAuthTab] = useState('login'); // 'login' | 'register'
  const [form, setForm] = useState({ email: '', password: '', username: '' });
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');

  const handleLogin = async () => {
    if (!form.email || !form.password) { setError('Inserisci email e password'); return; }
    setLoading(true); setError('');
    const { data, error } = await supabase.auth.signInWithPassword({ email: form.email, password: form.password });
    setLoading(false);
    if (error) { setError(error.message); return; }
    onLogged(data.user);
    onClose();
  };

  const handleRegister = async () => {
    if (!form.email || !form.password || !form.username) { setError('Tutti i campi sono obbligatori'); return; }
    if (form.password.length < 6) { setError('La password deve essere di almeno 6 caratteri'); return; }
    setLoading(true); setError('');
    const { data, error } = await supabase.auth.signUp({
      email: form.email,
      password: form.password,
      options: { data: { username: form.username } }
    });
    setLoading(false);
    if (error) { setError(error.message); return; }
    onLogged(data.user);
    onClose();
  };

  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal">
        <div className="auth-tabs">
          <button className={`auth-tab ${authTab==='login' ? 'active' : ''}`} onClick={() => { setAuthTab('login'); setError(''); }}>Accedi</button>
          <button className={`auth-tab ${authTab==='register' ? 'active' : ''}`} onClick={() => { setAuthTab('register'); setError(''); }}>Registrati</button>
        </div>
        {error && <div className="auth-error">⚠️ {error}</div>}
        {authTab === 'register' && (
          <div className="form-group">
            <label>Username *</label>
            <input value={form.username} onChange={e => setForm({...form, username: e.target.value})} placeholder="Es. mario_musica" />
          </div>
        )}
        <div className="form-group">
          <label>Email *</label>
          <input type="email" value={form.email} onChange={e => setForm({...form, email: e.target.value})} placeholder="la-tua@email.it" />
        </div>
        <div className="form-group">
          <label>Password *</label>
          <input type="password" value={form.password} onChange={e => setForm({...form, password: e.target.value})} placeholder={authTab==='register' ? 'Minimo 6 caratteri' : '••••••••'} />
        </div>
        <button className="btn-submit" onClick={authTab==='login' ? handleLogin : handleRegister} disabled={loading}>
          {loading ? 'Attendere...' : authTab==='login' ? '🎵 Accedi' : '🎸 Crea account'}
        </button>
        <button className="btn-cancel" onClick={onClose}>Annulla</button>
      </div>
    </div>
  );
}

// APP
function App() {
  const [tab, setTab] = useState('home');
  const [venues, setVenues] = useState([]);
  const [events, setEvents] = useState([]);
  const [loading, setLoading] = useState(false);
  const [search, setSearch] = useState('');
  const [modal, setModal] = useState(null); // 'venue' | 'event' | 'auth'
  const [toast, setToast] = useState(null);
  const [selectedRegion, setSelectedRegion] = useState(null);
  const [user, setUser] = useState(null);
  const mapRef = React.useRef(null);

  // Controlla sessione attiva all'avvio
  useEffect(() => {
    supabase.auth.getSession().then(({ data: { session } }) => {
      setUser(session?.user || null);
    });
    const { data: { subscription } } = supabase.auth.onAuthStateChange((_event, session) => {
      setUser(session?.user || null);
    });
    return () => subscription.unsubscribe();
  }, []);

  const handleLogout = async () => {
    await supabase.auth.signOut();
    setUser(null);
    showToast('Arrivederci! 👋');
  };

  const getInitials = (u) => {
    const name = u?.user_metadata?.username || u?.email || '?';
    return name.charAt(0).toUpperCase();
  };

  const showToast = (msg, type='success') => setToast({ msg, type });

  const loadVenues = useCallback(async () => {
    setLoading(true);
    try {
      let q = supabase.from('venues').select('*').order('created_at', { ascending: false });
      if (search) {
        q = q.ilike('citta', `%${search}%`);
      } else if (selectedRegion) {
        const cities = REGIONE_CITTA[selectedRegion] || [];
        if (cities.length) q = q.in('citta', cities);
      }
      const { data, error } = await q;
      if (error) console.error('loadVenues error:', error);
      setVenues(data || []);
    } catch(e) { console.error(e); }
    setLoading(false);
  }, [search, selectedRegion]);

  const loadEvents = useCallback(async () => {
    setLoading(true);
    try {
      let q = supabase.from('events').select('*').order('data', { ascending: true });
      if (search) {
        q = q.ilike('citta', `%${search}%`);
      } else if (selectedRegion) {
        const cities = REGIONE_CITTA[selectedRegion] || [];
        if (cities.length) q = q.in('citta', cities);
      }
      const { data, error } = await q;
      if (error) console.error('loadEvents error:', error);
      setEvents(data || []);
    } catch(e) { console.error(e); }
    setLoading(false);
  }, [search, selectedRegion]);

  useEffect(() => { loadVenues(); loadEvents(); }, [loadVenues, loadEvents]);

  // Listener eventi mappa (una sola volta)
  useEffect(() => {
    const mapEl = document.getElementById('the-italia-map');
    if (!mapEl) return;
    const handler = (e) => {
      setSelectedRegion(e.detail.name);
      setSearch('');
      document.querySelector('.stats-bar')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
    };
    mapEl.addEventListener('region-select', handler);
    return () => mapEl.removeEventListener('region-select', handler);
  }, []);


  const handleSearch = (e) => { e.preventDefault(); loadVenues(); loadEvents(); };

  return (
    <div>
      {/* HEADER */}
      <header>
        <div className="logo">MUSIC<span>NEW</span></div>
        <nav>
          <button className={tab==='home' ? 'active' : ''} onClick={() => setTab('home')}>Home</button>
          <button className={tab==='venues' ? 'active' : ''} onClick={() => setTab('venues')}>Locali</button>
          <button className={tab==='events' ? 'active' : ''} onClick={() => setTab('events')}>Eventi</button>
          {user && <button className="btn-add" onClick={() => setModal('venue')}>+ Locale</button>}
          {user && <button className="btn-add" onClick={() => setModal('event')}>+ Evento</button>}
          {user ? (
            <div className="user-area">
              <div className="user-avatar" title={user.user_metadata?.username || user.email}>{getInitials(user)}</div>
              <button className="btn-logout" onClick={handleLogout}>Esci</button>
            </div>
          ) : (
            <button className="btn-login" onClick={() => setModal('auth')}>Accedi</button>
          )}
        </nav>
      </header>

      {/* HOME */}
      {tab === 'home' && <>
        <div className="hero">
          <h1>MUSICA<br/><em>LIVE</em><br/>ITALIA</h1>
          <p>Trova concerti, feste, jam session e locali vicino a te. Aggiunto dalla community.</p>

            <input

        </div>

              {selectedRegion ? (

                  <span>📍</span>

          </div>
        </div>

        {/* ULTIMI LOCALI */}
        <div className="section">
          <div className="section-header">
            <div className="section-title">
              {selectedRegion ? <>{selectedRegion.toUpperCase().split(' ')[0]} <span>LOCALI</span></> : <>ULTIMI <span>LOCALI</span></>}
            </div>
            <button className="see-all" onClick={() => setTab('venues')}>Vedi tutti →</button>
          </div>
          {loading ? <div className="loading"><div className="spinner"/><span>Caricamento...</span></div> :
            venues.length === 0 ?

            <div className="grid grid-3">

                  </div>

            </div>
          }
        </div>

        {/* PROSSIMI EVENTI */}
        <div className="section">
          <div className="section-header">
            <div className="section-title">
              {selectedRegion ? <>EVENTI <span>IN ZONA</span></> : <>PROSSIMI <span>EVENTI</span></>}

          </div>
          {events.length === 0 ?
            <div className="empty">
              <div className="empty-icon">🎤</div>

                    <div className="event-date">
                      <div className="event-day">{day}</div>

                      <div className="event-title">{e.titolo}</div>
                      <div className="event-venue">📍 {e.citta}{e.ora ? ` · ${e.ora.slice(0,5)}` : ''}</div>

      {/* TAB LOCALI */}

        <div className="section-header">

          <div className="grid grid-3">

        </div>
        {loading ? <div className="loading"><div className="spinner"/></div> :
          events.length === 0 ?
          <div className="empty"><div className="empty-icon">🎤</div><h3>Nessun evento ancora</h3><p>Aggiungi il primo!</p></div> :
          <div className="grid grid-2">

                  <div className="event-info">

                      {e.tipo && <span className="tag">{e.tipo}</span>}

                    </div>

      {/* MODALS */}
      {modal === 'auth' && <ModalAuth onClose={() => setModal(null)} onLogged={(u) => { setUser(u); showToast('Bentornato! 🎵'); }} />}

      {modal === 'event' && <ModalEvent onClose={() => setModal(null)} onSaved={() => { loadEvents(); showToast('Evento aggiunto! 🎤'); }} />}

      {/* TOAST */}
      {toast && <Toast {...toast} onClose={() => setToast(null)} />}

      <footer>
        MusicNew — Musica live in Italia · Fatto dalla community 🎵
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

<script>
// Gestione mappa completamente fuori da React
// MutationObserver: ogni volta che #map-inline-anchor appare nel DOM, ci sposta la mappa
(function() {
  const mapRoot = document.getElementById('map-root');
  const mapEl   = document.getElementById('the-italia-map');

  function attachMap() {
    const anchor = document.getElementById('map-inline-anchor');
    if (anchor && mapRoot && !anchor.contains(mapRoot)) {
      anchor.appendChild(mapRoot);
      mapRoot.style.display = 'flex';
      if (mapEl) mapEl.style.display = 'block';
    }
  }

  // Osserva cambiamenti nel DOM
  const observer = new MutationObserver(attachMap);
  observer.observe(document.body, { childList: true, subtree: true });

  // Prova subito
  attachMap();
})();
</script>
